<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashcam Studio</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#151920; --panel2:#1b2028; --line:#2a313c;
    --ink:#e9eef5; --dim:#8b97a8; --accent:#9ee6ff; --accent2:#5ec8e6;
    --ok:#7ee0a0; --warn:#ffcf6b; --err:#ff8a8a;
    --font: "Futura","Avenir Next",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2)}
  header{padding:22px 30px;border-bottom:1px solid var(--line);display:flex;
    align-items:baseline;gap:14px}
  header h1{margin:0;font-size:20px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
  header .sub{color:var(--dim);font-size:13px;letter-spacing:1px}
  .health{margin-left:auto;font-size:12px;color:var(--dim);display:flex;gap:16px}
  .health b{font-weight:400}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;
    vertical-align:middle;background:var(--dim)}
  .dot.ok{background:var(--ok)} .dot.no{background:var(--err)}
  main{max-width:980px;margin:0 auto;padding:28px 30px 80px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:22px 24px;margin-bottom:22px}
  .card h2{margin:0 0 16px;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--dim);font-weight:700}
  label{display:block;font-size:12px;letter-spacing:1px;color:var(--dim);
    text-transform:uppercase;margin-bottom:6px}
  .row{display:flex;gap:12px;align-items:end;margin-bottom:16px}
  .row:last-child{margin-bottom:0}
  .grow{flex:1}
  input[type=text],select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:10px 12px;font-family:var(--font);font-size:14px}
  input[type=text]:focus,select:focus{outline:none;border-color:var(--accent2)}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 18px;font-family:var(--font);font-size:13px;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.12s}
  button:hover{border-color:var(--accent2);color:var(--accent)}
  button.primary{background:linear-gradient(180deg,#1d4657,#173948);border-color:var(--accent2);
    color:var(--accent)}
  button.primary:hover{background:linear-gradient(180deg,#245a6f,#1a4757)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.ghost{padding:8px 12px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--dim);font-weight:400;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  td select{padding:6px 8px;font-size:13px}
  .opts{display:flex;gap:22px;flex-wrap:wrap;align-items:end}
  .opts>div{min-width:150px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;
    letter-spacing:1px;background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
  .muted{color:var(--dim)}
  .err{color:var(--err)}
  #log{background:#0a0c0f;border:1px solid var(--line);border-radius:8px;padding:14px 16px;
    font-family:"SF Mono",Menlo,monospace;font-size:12.5px;line-height:1.55;
    white-space:pre-wrap;max-height:340px;overflow:auto;color:#c8d2df}
  .status{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .result{display:flex;gap:16px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  video{width:100%;border-radius:8px;border:1px solid var(--line);margin-top:8px}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    align-items:center;justify-content:center;z-index:10}
  .modal.on{display:flex}
  .browser{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    width:560px;max-height:70vh;display:flex;flex-direction:column;overflow:hidden}
  .browser .shortcuts{padding:12px 14px;border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:8px}
  .browser .shortcuts button{padding:6px 12px;font-size:12px}
  .browser .top{padding:14px 18px;border-bottom:1px solid var(--line);font-size:12px;
    color:var(--dim);word-break:break-all}
  .browser .list{overflow:auto;flex:1}
  .browser .item{padding:9px 18px;cursor:pointer;border-bottom:1px solid #1d222a;font-size:14px}
  .browser .item:hover{background:var(--panel2)}
  .browser .foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .tag{font-size:11px;color:var(--ok)}
  .chk{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:14px}
  .chk .mk{width:16px;text-align:center;font-weight:700}
  .chk .mk.ok{color:var(--ok)} .chk .mk.no{color:var(--err)}
  .chk .nm{min-width:230px}
  .chk .dt{color:var(--dim);font-size:12.5px}
  .fix{margin:2px 0 8px 26px}
  .fix summary{cursor:pointer;color:var(--warn);font-size:12.5px;letter-spacing:.5px}
  .fix pre{background:#0a0c0f;border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-family:"SF Mono",Menlo,monospace;font-size:12px;
    color:#c8d2df;white-space:pre-wrap;margin:8px 0 0}
  .cov{margin-top:6px;font-size:13px}
  .cov .miss{color:var(--warn)}
  .cov a{margin-left:8px}
  .dtitle{font-size:15px;font-weight:600}
  .dmeta{font-size:12.5px;color:var(--dim);margin-top:2px}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent2);cursor:pointer}
  .pv img{width:220px;border-radius:6px;border:1px solid var(--line);margin-top:8px;
    display:block;cursor:zoom-in;transition:border-color .12s}
  .pv img:hover{border-color:var(--accent2)}
  .pv .load{font-size:12px;color:var(--dim);margin-top:6px}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;
    align-items:center;justify-content:center;z-index:20;cursor:zoom-out;padding:24px}
  #lightbox.on{display:flex}
  #lightbox img{max-width:100%;max-height:100%;border-radius:8px;
    box-shadow:0 8px 40px rgba(0,0,0,.6)}
  #lightbox .close{position:absolute;top:20px;right:26px;font-size:30px;color:#fff;
    opacity:.7;cursor:pointer;line-height:1}
  #lightbox .close:hover{opacity:1}
</style>
</head>
<body>
<header>
  <h1>Dashcam Studio</h1>
  <span class="sub">clips + gps → drive videos</span>
  <div class="health" id="health"></div>
</header>

<main>
  <div class="card" id="preflightCard">
    <h2>System check <button class="ghost" style="float:right;padding:4px 10px"
      onclick="loadPreflight()">Recheck</button></h2>
    <div id="preflight" class="muted">checking…</div>
  </div>

  <div class="card">
    <h2>Folders</h2>
    <div class="row">
      <div class="grow">
        <label>Clips folder</label>
        <input type="text" id="clips" placeholder="/Users/kurt/…/clips">
      </div>
      <button class="ghost" onclick="openBrowse('clips')">Browse</button>
    </div>
    <div class="row">
      <div class="grow">
        <label>GPX folder</label>
        <input type="text" id="gpx" placeholder="/Users/kurt/…/gpx">
      </div>
      <button class="ghost" onclick="openBrowse('gpx')">Browse</button>
    </div>
    <div class="row">
      <button class="primary" id="scanBtn" onclick="doScan()">Scan</button>
      <span id="scanMsg" class="muted"></span>
    </div>
  </div>

  <div class="card" id="planCard" style="display:none">
    <h2>Drives detected</h2>
    <table id="planTable"></table>
    <div class="opts" style="margin-top:20px">
      <div>
        <label>Output</label>
        <select id="mode">
          <option value="full">Full speed + HUD</option>
          <option value="timelapse">Timelapse</option>
        </select>
      </div>
      <div id="durWrap" style="display:none">
        <label>Timelapse length (s)</label>
        <input type="text" id="dur" value="60">
      </div>
      <div>
        <label>HUD size</label>
        <select id="scale">
          <option value="0.625">Small</option>
          <option value="0.75" selected>Medium</option>
          <option value="0.875">Large</option>
        </select>
      </div>
      <div style="flex:1;text-align:right">
        <button class="primary" id="goBtn" onclick="doProcess()">Process ▸</button>
      </div>
    </div>
  </div>

  <div class="card" id="runCard" style="display:none">
    <h2>Progress</h2>
    <div class="status">
      <span id="spin" class="spin"></span>
      <span id="runStatus">starting…</span>
    </div>
    <div id="results"></div>
    <div id="log"></div>
  </div>
</main>

<div id="lightbox" onclick="closeLightbox()">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightboxImg" alt="preview">
</div>

<div class="modal" id="modal">
  <div class="browser">
    <div class="shortcuts" id="brShortcuts"></div>
    <div class="top" id="brPath"></div>
    <div class="list" id="brList"></div>
    <div class="foot">
      <span id="brTag" class="tag"></span>
      <button class="ghost" onclick="closeBrowse()">Cancel</button>
      <button class="primary ghost" onclick="pickHere()">Use this folder</button>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let plan = null, browseTarget = null, browsePath = null, pollTimer = null;

// If the page was opened as a file:// it has no server to talk to.
if(location.protocol === 'file:'){
  document.body.innerHTML = '<div style="max-width:640px;margin:80px auto;'+
    'font-family:sans-serif;color:#e9eef5;background:#151920;border:1px solid #2a313c;'+
    'border-radius:12px;padding:30px;line-height:1.6">'+
    '<h2 style="margin-top:0">Open it through the server, not the file</h2>'+
    'This page needs the backend running. In a terminal:'+
    '<pre style="background:#0a0c0f;padding:12px;border-radius:8px;overflow:auto">'+
    'cd ~/Documents/DashCam\n.venv/bin/python scripts/webui.py</pre>'+
    'then open <a style="color:#5ec8e6" href="http://127.0.0.1:5151">http://127.0.0.1:5151</a></div>';
  throw new Error('opened as file://');
}

async function jget(u){ return (await fetch(u)).json(); }
async function jpost(u,b){ return (await (await fetch(u,{method:'POST',
  headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()); }

// ---- preflight (system check) ----
async function loadPreflight(){
  $('#preflight').textContent = 'checking…';
  let r;
  try { r = await jget('/api/preflight'); }
  catch(e){
    $('#preflight').innerHTML = '<span class="err">can\'t reach the server — '+
      'is scripts/webui.py running?</span>';
    $('#health').innerHTML = '<span><span class="dot no"></span>offline</span>';
    return;
  }
  const nOk = r.checks.filter(c=>c.ok).length;
  $('#health').innerHTML = `<span><span class="dot ${r.ok?'ok':'no'}"></span>`+
    `${nOk}/${r.checks.length} ready</span>`;
  let h='';
  for(const c of r.checks){
    h += `<div class="chk"><span class="mk ${c.ok?'ok':'no'}">${c.ok?'✓':'✗'}</span>`+
      `<span class="nm">${c.name}</span><span class="dt">${c.detail}</span></div>`;
    if(!c.ok && c.fix)
      h += `<details class="fix"><summary>how to fix</summary><pre>${c.fix}</pre></details>`;
  }
  $('#preflight').innerHTML = h;
}

// ---- browse modal ----
async function openBrowse(target){
  browseTarget = target;
  const seed = $('#'+target).value || '';
  await loadBrowse(seed);
  $('#modal').classList.add('on');
}
function closeBrowse(){ $('#modal').classList.remove('on'); }
async function loadBrowse(path){
  const b = await jget('/api/browse?path='+encodeURIComponent(path));
  browsePath = b.path;
  $('#brPath').textContent = b.path;
  if(b.shortcuts){
    $('#brShortcuts').innerHTML = b.shortcuts.map(s =>
      `<button onclick="loadBrowse('${s.path.replace(/'/g,"\\'")}')">${s.name}</button>`).join('');
  }
  const tag = browseTarget==='clips'
    ? (b.has_clips?'✓ contains clips':'') : (b.has_gpx?'✓ contains GPX':'');
  $('#brTag').textContent = tag;
  let html = `<div class="item" onclick="loadBrowse('${b.parent.replace(/'/g,"\\'")}')">⬆ ..</div>`;
  for(const d of b.dirs)
    html += `<div class="item" onclick="loadBrowse('${(b.path+'/'+d).replace(/'/g,"\\'")}')">📁 ${d}</div>`;
  $('#brList').innerHTML = html;
}
function pickHere(){ $('#'+browseTarget).value = browsePath; closeBrowse(); }

// ---- scan ----
async function doScan(){
  $('#scanMsg').textContent = 'scanning…';
  const r = await jpost('/api/scan',{clips_dir:$('#clips').value, gpx_dir:$('#gpx').value});
  if(r.error){ $('#scanMsg').innerHTML = `<span class="err">${r.error}</span>`; return; }
  plan = r;
  $('#scanMsg').innerHTML = (r.skipped && r.skipped.length)
    ? `<span class="muted">skipped ${r.skipped.length} non-video file(s)</span>` : '';
  renderPlan(r);
  $('#planCard').style.display='block';
}
function renderPlan(r){
  let h = `<tr><th><input type="checkbox" id="selAll" checked onchange="toggleAll(this)"></th>`+
    `<th>Drive</th><th>GPX match</th><th></th></tr>`;
  for(const d of r.drives){
    const opts = r.gpx_files.map(g =>
      `<option value="${g}" ${g===d.gpx?'selected':''}>${g}</option>`).join('');
    const none = `<option value="">— none —</option>`;
    const cov = d.gpx ? (r.coverage||{})[d.gpx] : null;
    let covHtml = '';
    if(cov && !cov.error){
      if(cov.ok)
        covHtml = `<div class="cov muted">map data ✓ ${cov.covered.join(', ')}</div>`;
      else{
        const links = cov.missing.map(m =>
          `<span class="miss">${m.name}</span><a href="${m.pbf}" target="_blank">.pbf ↗</a>`).join(' · ');
        covHtml = `<div class="cov"><span class="miss">⚠ needs map data:</span> ${links}
          <details class="fix"><summary>how to add</summary><pre>1. download the .pbf above into valhalla/custom_files/
2. rebuild tiles:  docker rm -f valhalla && (see README Runbook, force_rebuild)
3. extract roads + admin for it (README osmium commands)
4. Recheck</pre></details></div>`;
      }
    }
    const title = d.route ? d.route : `Drive ${d.index+1}`;
    h += `<tr>
      <td><input type="checkbox" class="pick" data-drive="${d.index}" ${d.gpx?'checked':''}></td>
      <td><div class="dtitle">${title}</div>
        <div class="dmeta">${d.day} · ${d.time} · ${d.minutes} min · ${d.clips} clip${d.clips>1?'s':''}</div></td>
      <td><select data-drive="${d.index}">${none}${opts}</select>
        ${d.gpx?`<span class="muted"> ${d.gpx_overlap_min}m</span>`:'<span class="err"> no match</span>'}
        ${covHtml}</td>
      <td><button class="ghost" onclick="previewDrive(${d.index})">Preview</button>
        <div class="pv" id="pv${d.index}"></div></td>
    </tr>`;
  }
  $('#planTable').innerHTML = h;
}
function toggleAll(box){
  document.querySelectorAll('#planTable .pick').forEach(c=>c.checked=box.checked);
}

$('#mode') && $('#mode').addEventListener('change', e=>{
  $('#durWrap').style.display = e.target.value==='timelapse'?'block':'none';
});

// ---- lightbox ----
function openLightbox(url){
  $('#lightboxImg').src = url;
  $('#lightbox').classList.add('on');
}
function closeLightbox(){ $('#lightbox').classList.remove('on'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

// ---- preview ----
function gpxMap(){
  const m={};
  document.querySelectorAll('#planTable select[data-drive]').forEach(s=>{
    m[s.getAttribute('data-drive')] = s.value;
  });
  return m;
}
async function previewDrive(i){
  const box = $('#pv'+i);
  box.innerHTML = '<div class="load">rendering a frame…</div>';
  const {job} = await jpost('/api/preview',{clips_dir:$('#clips').value,
    gpx_dir:$('#gpx').value,
    opts:{drive:i, gpx_by_drive:gpxMap(), hud_scale:parseFloat($('#scale').value)}});
  const t = setInterval(async()=>{
    const j = await jget(`/api/jobs/${job}?since=999`);
    if(j.status==='done'){
      clearInterval(t);
      const png = j.results[0].preview;
      const url = `/outputs/${png}?t=${Date.now()}`;
      box.innerHTML = `<img src="${url}" title="Click to enlarge" onclick="openLightbox('${url}')">`;
    } else if(j.status==='error'){
      clearInterval(t);
      box.innerHTML = `<div class="load err">${j.error}</div>`;
    }
  }, 1000);
}

// ---- process ----
async function doProcess(){
  const gpx_by_drive = gpxMap();
  const drives = [...document.querySelectorAll('#planTable .pick:checked')]
    .map(c=>parseInt(c.getAttribute('data-drive')));
  if(!drives.length){ alert('Select at least one drive.'); return; }
  const opts = {
    mode: $('#mode').value,
    hud_scale: parseFloat($('#scale').value),
    target_duration: $('#mode').value==='timelapse' ? parseFloat($('#dur').value) : null,
    gpx_by_drive, drives
  };
  $('#runCard').style.display='block';
  $('#log').textContent=''; $('#results').innerHTML='';
  $('#runCard').scrollIntoView({behavior:'smooth'});
  const {job} = await jpost('/api/process',{clips_dir:$('#clips').value,
    gpx_dir:$('#gpx').value, opts});
  poll(job, 0);
}
async function poll(job, since){
  const j = await jget(`/api/jobs/${job}?since=${since}`);
  if(j.log && j.log.length){
    $('#log').textContent += j.log.join('\n')+'\n';
    $('#log').scrollTop = $('#log').scrollHeight;
  }
  $('#runStatus').textContent = j.status==='running'
    ? (j.current||'working…') : j.status;
  if(j.results) renderResults(j.results);
  if(j.status==='done' || j.status==='error'){
    $('#spin').style.display='none';
    if(j.error) $('#runStatus').innerHTML = `<span class="err">${j.error}</span>`;
    return;
  }
  setTimeout(()=>poll(job, j.log_len), 1000);
}
function renderResults(results){
  if(!results.length){ $('#results').innerHTML=''; return; }
  let h='';
  for(const r of results){
    h += `<div class="result">
      <span class="pill">drive ${r.drive}</span>
      <a href="/outputs/${r.file}" target="_blank">${r.file}</a>
      <button class="ghost" onclick="preview('${r.file}',this)">Preview</button>
    </div>`;
  }
  $('#results').innerHTML = h;
}
function preview(file, btn){
  const v = document.createElement('video');
  v.src = '/outputs/'+file; v.controls = true;
  btn.parentElement.after(v); btn.remove();
}

loadPreflight();
</script>
</body>
</html>
